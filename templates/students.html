<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Students Database</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Poppins,sans-serif;
        }

        body{

            background:#0f172a;

            color:white;

            padding:40px;
        }

        h1{

            margin-bottom:30px;

            font-size:40px;

            color:#06b6d4;
        }

        table{

            width:100%;

            border-collapse:collapse;

            overflow:hidden;

            border-radius:15px;
        }

        th{

            background:#06b6d4;

            padding:15px;

            text-align:left;
        }

        td{

            padding:14px;

            border-bottom:
            1px solid #334155;
        }

        tr:nth-child(even){

            background:#1e293b;
        }

        tr:hover{

            background:#334155;
        }

    </style>

</head>

<body>

    <h1>Students Database</h1>

    <table>

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>City</th>
            <th>State</th>
            <th>Status</th>

        </tr>

        {% for student in students %}

        <tr>

            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[3] }}</td>
            <td>{{ student[7] }}</td>
            <td>{{ student[8] }}</td>
            <td>{{ student[10] }}</td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
