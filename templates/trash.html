<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trash</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="students-table" style="padding:40px;">

    <h1 class="table-title">

        Deleted Students

    </h1>

    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                {% for student in students %}

                <tr>

                    <td>{{ student[0] }}</td>
                    <td>{{ student[1] }}</td>
                    <td>{{ student[2] }}</td>

                    <td>

                        <a
                            href="/restore/{{ student[0] }}"
                            class="edit-btn"
                        >
                            Restore
                        </a>

                        <a
                            href="/permanent-delete/{{ student[0] }}"
                            class="delete-btn"
                        >
                            Delete Forever
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
